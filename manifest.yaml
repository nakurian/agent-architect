# ============================================================================
# PROJECT MANIFEST — The single source of truth for the orchestration framework
# ============================================================================
# This file drives all agent behavior. Configure it once, agents do the rest.
#
# INSTRUCTIONS:
#   1. Fill in project metadata
#   2. Define your services (add/remove as needed)
#   3. Set each service's `status` to control what agents do with it
#   4. Run phases: /project:1-discover → /project:2-architect → etc.
# ============================================================================

project:
  name: "your-project-name"
  description: "Brief description of what this system does"
  business_domain: "e.g., e-commerce, fintech, healthcare"
  team: "your-team-name"
  started: "2026-03-17"

# ---------------------------------------------------------------------------
# FRAMEWORK — Version and mode tracking for team orchestration
# ---------------------------------------------------------------------------
# version: "1.0" = sequential only, "2.0" = team-capable
# mode: "sequential" (run phases manually) or "teams" (agent team orchestrates)
# Phase commands work identically in both modes — teams add orchestration on top.
# ---------------------------------------------------------------------------
framework:
  version: "2.0"
  mode: "sequential"           # "sequential" | "teams" — set by /project:team-start
  migrated_from: null          # set to "1.0" if upgraded from old version
  migrated_at: null
  completed_phases: []         # auto-detected from phases/ directory

# ---------------------------------------------------------------------------
# TECH STACK — Agents will follow these choices
# ---------------------------------------------------------------------------
tech_stack:
  languages:
    backend: "Java 21"
    frontend: "TypeScript"
  backend_framework: "Spring Boot 3.4+ (WebFlux / Netty)"
  frontend_framework: "Next.js / React 18+ / MUI 6"
  database: "Couchbase"
  cache: "Hazelcast"
  message_broker: "Kafka"
  api_style: "REST"
  shared_library: ""              # e.g., "com.example.platform:starter-common-web"
  build_tool: "Gradle (Kotlin DSL)"
  container: "Docker"
  ci_cd: "GitHub Actions"
  testing:
    unit: "JUnit 5 + Mockito + StepVerifier"
    integration: "WebTestClient (@WebFluxTest)"
    e2e: "Playwright"
    contract: "Pact"
    coverage: "JaCoCo (80% minimum)"
    quality: "Spotless + Checkstyle (Google style, 0 violations)"
  observability:
    logging: "SLF4J + Log4j2 (structured JSON)"
    tracing: "Micrometer Brave (traceId/spanId)"
    monitoring: "Prometheus + Grafana"
    health: "/adm/actuator/health (liveness + readiness + startup)"

# ---------------------------------------------------------------------------
# SERVICES — Define every service in the system
# ---------------------------------------------------------------------------
# status options:
#   new        → service doesn't exist yet, build from scratch
#   existing   → service exists, reference its repo/api spec
#   enrich     → service exists but needs new features/changes
#   skip       → don't touch this service in current phase
#
# type options: ui, bff, domain, shared-lib, infrastructure
#
# repo & local_path:
#   repo       → git URL (for cloning existing repos or pushing new ones)
#   local_path → absolute or relative path to the service code on disk
#                leave empty — the builder agent will ask at build time
#                once set, all future builds/rebuilds use this path
# ---------------------------------------------------------------------------
services:

  # --- Example: Frontend ---
  - name: "admin-ui"
    type: "ui"
    status: "new"                  # change to: new | existing | enrich | skip
    description: "Backoffice administration application"
    owner: ""                      # team or person responsible (e.g., "frontend-team", "@john")
    repo: ""                       # git URL — for clone/push (e.g., github.com/org/admin-ui)
    local_path: ""                 # where the code lives on disk — builder asks if empty
    port: 3000
    database: null                 # null = no database for this service
    depends_on:
      - "api-gateway"
    owns_events: []                # events this service publishes
    notes: ""

  # --- Example: BFF ---
  - name: "api-gateway"
    type: "bff"
    status: "new"
    description: "Backend-for-frontend aggregating domain APIs for admin UI"
    owner: ""
    repo: ""
    local_path: ""
    port: 4000
    database: null                 # BFF typically has no database
    depends_on:
      - "order-service"
      - "user-service"
    owns_events: []
    notes: ""

  # --- Example: Domain Service ---
  - name: "order-service"
    type: "domain"
    status: "new"
    description: "Manages orders and transactions"
    owner: ""
    repo: ""
    local_path: ""
    port: 5001
    database: null                 # null = uses tech_stack default (Couchbase)
    depends_on: []
    owns_events:
      - "order.created"
      - "order.updated"
    notes: ""

  # --- Example: Existing Service (already has a repo) ---
  - name: "user-service"
    type: "domain"
    status: "existing"
    description: "Manages user profiles and preferences"
    owner: ""
    repo: "https://github.com/your-org/user-service"
    local_path: ""                 # builder will ask where to clone, or set path if already cloned
    port: 5002
    database: null                 # null = uses tech_stack default (Couchbase)
    depends_on:
      - "order-service"            # listens to order events
    owns_events:
      - "user.created"
      - "user.updated"
    notes: "Already in production. API spec in references/existing-apis/"

# ---------------------------------------------------------------------------
# ENVIRONMENTS — Where services run
# ---------------------------------------------------------------------------
environments:
  - name: "local"
    description: "Local development (docker-compose)"
  - name: "dev"
    description: "Shared development environment"
    # Add environment-specific config like URLs, feature flags, etc.
  - name: "staging"
    description: "Pre-production validation"
  - name: "production"
    description: "Live environment"

# ---------------------------------------------------------------------------
# BUILD TARGETS — Which services to build/enrich in current run
# ---------------------------------------------------------------------------
# Override: list specific services to build. If empty, builds all non-skip.
# This is what you change between runs to focus agents on specific services.
# ---------------------------------------------------------------------------
build_targets: []
# Example: ["order-service", "bff-gateway"]

# ---------------------------------------------------------------------------
# QUALITY GATES — What must pass before moving to next phase
# ---------------------------------------------------------------------------
quality_gates:
  spec_review: true                # Human must approve specs before building
  contract_review: true            # Human must approve API contracts
  test_plan_review: true           # Human/QA must approve TEST-PLAN.md before building
  test_coverage_minimum: 80        # Percentage (line coverage)
  test_case_coverage_minimum: 95   # Percentage of P0+P1 test cases that must be implemented
  contract_test_required: true     # Pact tests must exist for every contract
  security_test_required: true     # Security test cases must be executed
  integration_test_required: true  # Cross-service integration scenarios must pass
  linting_must_pass: true
  security_scan: true              # Run basic security checks
  pr_review_required: true         # Builder creates PRs, not direct commits

# ---------------------------------------------------------------------------
# APPROVALS — Track who reviewed what (agents update this, humans verify)
# ---------------------------------------------------------------------------
# Agents will prompt for sign-off at quality gates and record it here.
# This creates an audit trail of who approved specs/contracts before building.
# ---------------------------------------------------------------------------
approvals: {}
# Example after spec review:
# approvals:
#   spec_review:
#     approved_by: "@john"
#     date: "2026-03-17"
#     notes: "Approved with minor comment on order-service pagination"
#   contract_review:
#     approved_by: "@sarah"
#     date: "2026-03-18"
